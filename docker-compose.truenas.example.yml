# TrueNAS SCALE deployment example — paste into "Install via YAML" → Custom Config.
# Copy this file, replace the placeholder values with your actual credentials, and paste the content into TrueNAS.
# 
# Uses host paths on ZFS dataset instead of named volumes.
# Does not expose common ports to avoid conflicts with other TrueNAS apps.
# To enable offsite backup, remove the "profiles" line or deploy separately.

services:
  db:
    image: postgres:16-alpine
    container_name: inventory-db
    environment:
      POSTGRES_DB: caramelo_inventory
      POSTGRES_USER: caramelo
      POSTGRES_PASSWORD: "<YOUR_DB_PASSWORD>"
    volumes:
      - /mnt/Storage/apps/inventory_control/db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caramelo -d caramelo_inventory"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  db-migrate:
    image: pattersonrptr/inventory-control:latest
    container_name: inventory-migrate
    command: ["dotnet", "InventoryControl.dll", "migrate"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=caramelo_inventory;Username=caramelo;Password=<YOUR_DB_PASSWORD>
    restart: "no"

  app:
    image: pattersonrptr/inventory-control:latest
    container_name: inventory-control
    ports:
      - "9080:8080"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=caramelo_inventory;Username=caramelo;Password=<YOUR_DB_PASSWORD>
      - Stores__0__Name=Nuvemshop
      - Stores__0__Enabled=true
      - Stores__0__Platform=nuvemshop
      - Stores__0__StoreId=<YOUR_NUVEMSHOP_STORE_ID>
      - Stores__0__AccessToken=<YOUR_NUVEMSHOP_ACCESS_TOKEN>
      - Stores__0__OrderSyncIntervalMinutes=15
      - Api__Keys__0__Key=<YOUR_API_KEY>
      - Api__Keys__0__Role=Admin
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  backup:
    image: prodrigestivill/postgres-backup-local
    container_name: inventory-backup
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: caramelo_inventory
      POSTGRES_USER: caramelo
      POSTGRES_PASSWORD: "<YOUR_DB_PASSWORD>"
      SCHEDULE: "0 */12 * * *"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 0
      HEALTHCHECK_PORT: 8081
    volumes:
      - /mnt/Storage/apps/inventory_control/backups:/backups
    restart: unless-stopped

  offsite-backup:
    image: rclone/rclone
    container_name: inventory-offsite-backup
    depends_on:
      - backup
    volumes:
      - /mnt/Storage/apps/inventory_control/backups:/backups:ro
      - /mnt/Storage/apps/inventory_control/rclone-config:/config/rclone
    environment:
      RCLONE_REMOTE: gdrive:inventory-control-backups
      SYNC_INTERVAL: 12h
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Offsite backup: syncing /backups to $RCLONE_REMOTE every $SYNC_INTERVAL"
        while true; do
          rclone sync /backups $RCLONE_REMOTE --log-level INFO
          sleep_seconds=$(echo $SYNC_INTERVAL | sed 's/h/*3600/' | sed 's/m/*60/' | bc)
          sleep $sleep_seconds
        done
    restart: unless-stopped
