services:
  db:
    image: postgres:16-alpine
    container_name: inventory-db
    environment:
      POSTGRES_DB: caramelo_inventory
      POSTGRES_USER: caramelo
      POSTGRES_PASSWORD: ${DB_PASSWORD:-#Caramelo123}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caramelo -d caramelo_inventory"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m

  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile
    image: pattersonrptr/inventory-control:latest
    container_name: inventory-migrate
    command: ["dotnet", "InventoryControl.dll", "migrate"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=caramelo_inventory;Username=caramelo;Password=${DB_PASSWORD:-#Caramelo123}
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pattersonrptr/inventory-control:latest
    container_name: inventory-control
    ports:
      - "8080:8080"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=caramelo_inventory;Username=caramelo;Password=${DB_PASSWORD:-#Caramelo123}
      - OffsiteBackup__RcloneConfigPath=/config/rclone/rclone.conf
      - OffsiteBackup__RemotePath=${RCLONE_REMOTE:-gdrive:inventory-control-backups/manual}
      - Stores__0__Name=${STORE_NAME:-My Nuvemshop}
      - Stores__0__Enabled=${STORE_ENABLED:-false}
      - Stores__0__Platform=${STORE_PLATFORM:-nuvemshop}
      - Stores__0__StoreId=${STORE_ID:-}
      - Stores__0__AccessToken=${STORE_ACCESS_TOKEN:-}
      - Stores__0__OrderSyncIntervalMinutes=${STORE_SYNC_INTERVAL_MINUTES:-15}
      - Api__Keys__0__Key=${API_KEY:-}
      - Api__Keys__0__Role=Admin
    volumes:
      - rclone-config:/config/rclone:ro
      - product-images:/app/wwwroot/images/products
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m

  backup:
    image: prodrigestivill/postgres-backup-local
    container_name: inventory-backup
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: caramelo_inventory
      POSTGRES_USER: caramelo
      POSTGRES_PASSWORD: ${DB_PASSWORD:-#Caramelo123}
      SCHEDULE: "0 */12 * * *"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 0
      HEALTHCHECK_PORT: 8081
    volumes:
      - backups:/backups
    restart: unless-stopped

  offsite-backup:
    image: rclone/rclone
    container_name: inventory-offsite-backup
    # profiles: ["offsite"]
    depends_on:
      - backup
    volumes:
      - backups:/backups:ro
      - rclone-config:/config/rclone
    environment:
      RCLONE_REMOTE: ${RCLONE_REMOTE:-gdrive:inventory-control-backups}
      SYNC_INTERVAL: ${SYNC_INTERVAL:-12h}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Offsite backup: syncing /backups to $$RCLONE_REMOTE every $$SYNC_INTERVAL"
        while true; do
          rclone sync /backups $$RCLONE_REMOTE --log-level INFO
          sleep_seconds=$$(echo $$SYNC_INTERVAL | sed 's/h/*3600/' | sed 's/m/*60/' | bc)
          sleep $$sleep_seconds
        done
    restart: unless-stopped

volumes:
  db-data:
  backups:
  rclone-config:
  product-images:
