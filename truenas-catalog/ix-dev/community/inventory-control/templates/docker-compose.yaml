{# Inventory Control — TrueNAS Catalog App Template #}
{# Renders a Docker Compose configuration using the TrueNAS ix_lib library #}

{% set tpl = ix_lib.base.render.Render(values) %}

{# ── Permissions container ──────────────────────────────────────────── #}
{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}

{# ── PostgreSQL Database ────────────────────────────────────────────── #}
{% set pg_config = {
  "user": values.inventory.db_user,
  "password": values.inventory.db_password,
  "database": values.consts.db_name,
  "volume": values.storage.postgres_data,
} %}
{% set postgres = tpl.deps.postgres(
  values.consts.db_container_name, "postgres_image", pg_config, perm_container
) %}

{# ── Application Container ──────────────────────────────────────────── #}
{% set app = tpl.add_container(values.consts.app_container_name, "image") %}
{% do app.set_user(0, 0) %}
{% do app.add_caps(["CHOWN", "DAC_OVERRIDE", "FOWNER", "SETGID", "SETUID", "NET_BIND_SERVICE"]) %}
{% do app.healthcheck.set_test("curl", {"port": 8080, "path": "/health"}) %}
{% do app.depends.add_dependency(values.consts.db_container_name, "service_healthy") %}

{# ASP.NET Core connection string (Npgsql format) #}
{% set conn_string = "Host=%s;Port=5432;Database=%s;Username=%s;Password=%s"|format(
  values.consts.db_container_name,
  values.consts.db_name,
  values.inventory.db_user,
  values.inventory.db_password
) %}
{% do app.environment.add_env("ASPNETCORE_ENVIRONMENT", "Production") %}
{% do app.environment.add_env("ConnectionStrings__DefaultConnection", conn_string) %}

{# Admin account #}
{% do app.environment.add_env("DefaultAdmin__Email", values.inventory.admin_email) %}
{% do app.environment.add_env("DefaultAdmin__Password", values.inventory.admin_password) %}
{% do app.environment.add_env("DefaultAdmin__FullName", values.inventory.admin_full_name) %}
{% do app.environment.add_env("Api__Key", values.inventory.api_key) %}

{# Store integration (Nuvemshop) #}
{% if values.inventory.store_enabled %}
  {% do app.environment.add_env("Stores__0__Name", values.inventory.store_name) %}
  {% do app.environment.add_env("Stores__0__Enabled", "true") %}
  {% do app.environment.add_env("Stores__0__Platform", "nuvemshop") %}
  {% do app.environment.add_env("Stores__0__StoreId", values.inventory.store_id) %}
  {% do app.environment.add_env("Stores__0__AccessToken", values.inventory.store_access_token) %}
  {% do app.environment.add_env("Stores__0__OrderSyncIntervalMinutes",
    "%d"|format(values.inventory.store_sync_interval)) %}
{% endif %}

{# Additional environment variables #}
{% do app.environment.add_user_envs(values.inventory.additional_envs) %}

{# Port mapping — app listens on 8080 internally #}
{% do app.add_port(values.network.web_port, {"container_port": 8080}) %}

{# Additional app storage #}
{% for store in values.storage.additional_storage %}
  {% do app.add_storage(store.mount_path, store) %}
{% endfor %}

{# ── Backup Container (optional) ────────────────────────────────────── #}
{% if values.inventory.backup_enabled %}
  {% set backup = tpl.add_container(values.consts.backup_container_name, "backup_image") %}
  {% do backup.set_user(0, 0) %}
  {% do backup.add_caps(["CHOWN", "DAC_OVERRIDE", "FOWNER", "SETGID", "SETUID"]) %}
  {% do backup.depends.add_dependency(values.consts.db_container_name, "service_healthy") %}
  {% do backup.healthcheck.set_test("tcp", {"port": 8081}) %}

  {% do backup.environment.add_env("POSTGRES_HOST", values.consts.db_container_name) %}
  {% do backup.environment.add_env("POSTGRES_DB", values.consts.db_name) %}
  {% do backup.environment.add_env("POSTGRES_USER", values.inventory.db_user) %}
  {% do backup.environment.add_env("POSTGRES_PASSWORD", values.inventory.db_password) %}
  {% do backup.environment.add_env("SCHEDULE", values.inventory.backup_schedule) %}
  {% do backup.environment.add_env("BACKUP_KEEP_DAYS",
    "%d"|format(values.inventory.backup_keep_days)) %}
  {% do backup.environment.add_env("BACKUP_KEEP_WEEKS",
    "%d"|format(values.inventory.backup_keep_weeks)) %}
  {% do backup.environment.add_env("BACKUP_KEEP_MONTHS", "0") %}
  {% do backup.environment.add_env("HEALTHCHECK_PORT", "8081") %}

  {% do backup.add_storage("/backups", values.storage.backups) %}
{% endif %}

{# ── Offsite Backup Container (optional) ─────────────────────────────── #}
{% if values.inventory.backup_enabled and values.inventory.offsite_enabled %}
  {% set offsite = tpl.add_container(values.consts.offsite_container_name, "offsite_image") %}
  {% do offsite.set_user(0, 0) %}
  {% do offsite.depends.add_dependency(values.consts.backup_container_name, "service_started") %}
  {% do offsite.set_entrypoint(["/bin/sh", "-c"]) %}

  {% set sleep_seconds = values.inventory.offsite_interval_hours * 3600 %}
  {% set offsite_cmd = 'echo "Offsite backup: syncing to %s every %dh"; while true; do rclone sync /backups %s --log-level INFO --config /config/rclone/rclone.conf; sleep %d; done'|format(
    values.inventory.offsite_remote,
    values.inventory.offsite_interval_hours,
    values.inventory.offsite_remote,
    sleep_seconds
  ) %}
  {% do offsite.set_command([offsite_cmd]) %}

  {% do offsite.add_storage("/backups", values.storage.backups) %}
  {% do offsite.add_storage("/config/rclone", values.storage.rclone_config) %}
  {% do offsite.healthcheck.disable() %}
{% endif %}

{# ── Permissions activation ──────────────────────────────────────────── #}
{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do app.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
  {% do postgres.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{# ── Web UI Portal ───────────────────────────────────────────────────── #}
{% do tpl.portals.add(values.network.web_port) %}

{# ── Notes ───────────────────────────────────────────────────────────── #}
{% do tpl.notes.add_info("Default admin login: use the email and password configured in Inventory Configuration.") %}
{% if values.inventory.store_enabled %}
  {% do tpl.notes.add_info("Nuvemshop integration is enabled. Orders will sync every %d minutes."|format(values.inventory.store_sync_interval)) %}
{% endif %}

{{ tpl.render() | tojson }}
