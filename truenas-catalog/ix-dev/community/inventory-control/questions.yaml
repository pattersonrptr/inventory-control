groups:
  - name: "Inventory Configuration"
    description: "Configure Inventory Control"
  - name: "Network Configuration"
    description: "Configure Network for Inventory Control"
  - name: "Storage Configuration"
    description: "Configure Storage for Inventory Control"
  - name: "Labels Configuration"
    description: "Configure Labels for Inventory Control"
  - name: "Resources Configuration"
    description: "Configure Resources for Inventory Control"

questions:
  - variable: TZ
    group: "Inventory Configuration"
    label: "Timezone"
    schema:
      type: string
      default: "America/Sao_Paulo"
      required: true
      $ref:
        - definitions/timezone

  - variable: inventory
    label: ""
    group: "Inventory Configuration"
    schema:
      type: dict
      attrs:
        - variable: admin_email
          label: "Admin Email"
          description: "Email address for the default administrator account."
          schema:
            type: string
            default: "admin@inventory.local"
            required: true
        - variable: admin_password
          label: "Admin Password"
          description: "Password for the default administrator account."
          schema:
            type: string
            default: ""
            required: true
            private: true
        - variable: admin_full_name
          label: "Admin Full Name"
          schema:
            type: string
            default: "Administrator"
            required: true
        - variable: api_key
          label: "API Key"
          description: "API key for webhook endpoints."
          schema:
            type: string
            default: ""
            required: true
            private: true
        - variable: db_user
          label: "Database User"
          schema:
            type: string
            default: "inventory"
            required: true
        - variable: db_password
          label: "Database Password"
          schema:
            type: string
            default: ""
            required: true
            private: true
        - variable: store_enabled
          label: "Enable Store Integration"
          description: "Enable Nuvemshop e-commerce platform integration."
          schema:
            type: boolean
            default: false
        - variable: store_name
          label: "Store Name"
          schema:
            type: string
            default: "Nuvemshop"
            show_if:
              - - store_enabled
                - "="
                - true
        - variable: store_id
          label: "Store ID"
          description: "Your Nuvemshop store ID."
          schema:
            type: string
            default: ""
            show_if:
              - - store_enabled
                - "="
                - true
        - variable: store_access_token
          label: "Store Access Token"
          description: "Your Nuvemshop access token."
          schema:
            type: string
            default: ""
            private: true
            show_if:
              - - store_enabled
                - "="
                - true
        - variable: store_sync_interval
          label: "Order Sync Interval (minutes)"
          description: "How often to sync orders from the store."
          schema:
            type: int
            default: 15
            min: 1
            max: 1440
            show_if:
              - - store_enabled
                - "="
                - true
        - variable: backup_enabled
          label: "Enable Database Backups"
          description: "Enable automatic PostgreSQL backups."
          schema:
            type: boolean
            default: true
        - variable: backup_schedule
          label: "Backup Schedule (cron)"
          description: "Cron expression for backup schedule."
          schema:
            type: string
            default: "0 */12 * * *"
            show_if:
              - - backup_enabled
                - "="
                - true
        - variable: backup_keep_days
          label: "Keep Daily Backups (days)"
          schema:
            type: int
            default: 7
            min: 1
            show_if:
              - - backup_enabled
                - "="
                - true
        - variable: backup_keep_weeks
          label: "Keep Weekly Backups (weeks)"
          schema:
            type: int
            default: 4
            min: 0
            show_if:
              - - backup_enabled
                - "="
                - true
        - variable: offsite_enabled
          label: "Enable Offsite Backup"
          description: "Sync backups to a remote storage using rclone."
          schema:
            type: boolean
            default: false
            show_if:
              - - backup_enabled
                - "="
                - true
        - variable: offsite_remote
          label: "Rclone Remote"
          description: "Rclone remote destination (e.g., gdrive:inventory-backups)."
          schema:
            type: string
            default: "gdrive:inventory-control-backups"
            show_if:
              - - offsite_enabled
                - "="
                - true
        - variable: offsite_interval_hours
          label: "Offsite Sync Interval (hours)"
          schema:
            type: int
            default: 12
            min: 1
            max: 168
            show_if:
              - - offsite_enabled
                - "="
                - true
        - variable: additional_envs
          label: "Additional Environment Variables"
          schema:
            type: list
            default: []
            items:
              - variable: env
                label: "Environment Variable"
                schema:
                  type: dict
                  attrs:
                    - variable: name
                      label: "Name"
                      schema:
                        type: string
                        required: true
                    - variable: value
                      label: "Value"
                      schema:
                        type: string

  - variable: network
    label: ""
    group: "Network Configuration"
    schema:
      type: dict
      attrs:
        - variable: web_port
          label: "WebUI Port"
          schema:
            type: dict
            attrs:
              - variable: bind_mode
                label: "Port Bind Mode"
                description: "The port bind mode.</br>\n- Publish: The port will be published on the host for external access.</br>\n- Expose: The port will be exposed for inter-container communication.</br>\n- None: The port will not be exposed or published.\n"
                schema:
                  type: string
                  default: "published"
                  enum:
                    - value: "published"
                      description: "Publish port on the host for external access"
                    - value: "exposed"
                      description: "Expose port for inter-container communication"
                    - value: ""
                      description: "None"
              - variable: port_number
                label: "Port Number"
                schema:
                  type: int
                  default: 9080
                  min: 1
                  max: 65535
                  required: true
              - variable: host_ips
                label: "Host IPs"
                description: "IPs on the host to bind this port"
                schema:
                  type: list
                  show_if:
                    - - bind_mode
                      - "="
                      - "published"
                  default: []
                  items:
                    - variable: host_ip
                      label: "Host IP"
                      schema:
                        type: string
                        required: true
                        $ref:
                          - definitions/node_bind_ip

  - variable: storage
    label: ""
    group: "Storage Configuration"
    schema:
      type: dict
      attrs:
        - variable: postgres_data
          label: "PostgreSQL Data Storage"
          description: "Storage for PostgreSQL database data."
          schema:
            type: dict
            attrs:
              - variable: type
                label: "Type"
                description: "ixVolume: Is dataset created automatically by the system.</br>\nHost Path: Is a path that already exists on the system.\n"
                schema:
                  type: string
                  required: true
                  default: "ix_volume"
                  enum:
                    - value: "host_path"
                      description: "Host Path (Path that already exists on the system)"
                    - value: "ix_volume"
                      description: "ixVolume (Dataset created automatically by the system)"
              - variable: ix_volume_config
                label: "ixVolume Configuration"
                description: "The configuration for the ixVolume dataset."
                schema:
                  type: dict
                  show_if:
                    - - type
                      - "="
                      - "ix_volume"
                  $ref:
                    - normalize/ix_volume
                  attrs:
                    - variable: acl_enable
                      label: "Enable ACL"
                      description: "Enable ACL for the storage."
                      schema:
                        type: boolean
                        default: false
                    - variable: dataset_name
                      label: "Dataset Name"
                      description: "The name of the dataset to use for storage."
                      schema:
                        type: string
                        required: true
                        hidden: true
                        default: "postgres-data"
                    - variable: acl_entries
                      label: "ACL Configuration"
                      schema:
                        type: dict
                        show_if:
                          - - acl_enable
                            - "="
                            - true
                        attrs: []
              - variable: host_path_config
                label: "Host Path Configuration"
                schema:
                  type: dict
                  show_if:
                    - - type
                      - "="
                      - "host_path"
                  attrs:
                    - variable: acl_enable
                      label: "Enable ACL"
                      description: "Enable ACL for the storage."
                      schema:
                        type: boolean
                        default: false
                    - variable: acl
                      label: "ACL Configuration"
                      schema:
                        type: dict
                        show_if:
                          - - acl_enable
                            - "="
                            - true
                        attrs: []
                        $ref:
                          - normalize/acl
                    - variable: path
                      label: "Host Path"
                      description: "The host path to use for storage."
                      schema:
                        type: hostpath
                        show_if:
                          - - acl_enable
                            - "="
                            - false
                        required: true
        - variable: backups
          label: "Backups Storage"
          description: "Storage for database backups."
          schema:
            type: dict
            attrs:
              - variable: type
                label: "Type"
                description: "ixVolume: Is dataset created automatically by the system.</br>\nHost Path: Is a path that already exists on the system.\n"
                schema:
                  type: string
                  required: true
                  default: "ix_volume"
                  enum:
                    - value: "host_path"
                      description: "Host Path (Path that already exists on the system)"
                    - value: "ix_volume"
                      description: "ixVolume (Dataset created automatically by the system)"
              - variable: ix_volume_config
                label: "ixVolume Configuration"
                description: "The configuration for the ixVolume dataset."
                schema:
                  type: dict
                  show_if:
                    - - type
                      - "="
                      - "ix_volume"
                  $ref:
                    - normalize/ix_volume
                  attrs:
                    - variable: acl_enable
                      label: "Enable ACL"
                      schema:
                        type: boolean
                        default: false
                    - variable: dataset_name
                      label: "Dataset Name"
                      schema:
                        type: string
                        required: true
                        hidden: true
                        default: "backups"
                    - variable: acl_entries
                      label: "ACL Configuration"
                      schema:
                        type: dict
                        show_if:
                          - - acl_enable
                            - "="
                            - true
                        attrs: []
              - variable: host_path_config
                label: "Host Path Configuration"
                schema:
                  type: dict
                  show_if:
                    - - type
                      - "="
                      - "host_path"
                  attrs:
                    - variable: acl_enable
                      label: "Enable ACL"
                      description: "Enable ACL for the storage."
                      schema:
                        type: boolean
                        default: false
                    - variable: acl
                      label: "ACL Configuration"
                      schema:
                        type: dict
                        show_if:
                          - - acl_enable
                            - "="
                            - true
                        attrs: []
                        $ref:
                          - normalize/acl
                    - variable: path
                      label: "Host Path"
                      description: "The host path to use for storage."
                      schema:
                        type: hostpath
                        show_if:
                          - - acl_enable
                            - "="
                            - false
                        required: true
        - variable: rclone_config
          label: "Rclone Configuration Storage"
          description: "Storage for rclone configuration files (for offsite backup)."
          schema:
            type: dict
            attrs:
              - variable: type
                label: "Type"
                schema:
                  type: string
                  required: true
                  default: "ix_volume"
                  enum:
                    - value: "host_path"
                      description: "Host Path (Path that already exists on the system)"
                    - value: "ix_volume"
                      description: "ixVolume (Dataset created automatically by the system)"
              - variable: ix_volume_config
                label: "ixVolume Configuration"
                schema:
                  type: dict
                  show_if:
                    - - type
                      - "="
                      - "ix_volume"
                  $ref:
                    - normalize/ix_volume
                  attrs:
                    - variable: acl_enable
                      label: "Enable ACL"
                      schema:
                        type: boolean
                        default: false
                    - variable: dataset_name
                      label: "Dataset Name"
                      schema:
                        type: string
                        required: true
                        hidden: true
                        default: "rclone-config"
                    - variable: acl_entries
                      label: "ACL Configuration"
                      schema:
                        type: dict
                        show_if:
                          - - acl_enable
                            - "="
                            - true
                        attrs: []
              - variable: host_path_config
                label: "Host Path Configuration"
                schema:
                  type: dict
                  show_if:
                    - - type
                      - "="
                      - "host_path"
                  attrs:
                    - variable: acl_enable
                      label: "Enable ACL"
                      schema:
                        type: boolean
                        default: false
                    - variable: acl
                      label: "ACL Configuration"
                      schema:
                        type: dict
                        show_if:
                          - - acl_enable
                            - "="
                            - true
                        attrs: []
                        $ref:
                          - normalize/acl
                    - variable: path
                      label: "Host Path"
                      description: "The host path to use for storage."
                      schema:
                        type: hostpath
                        show_if:
                          - - acl_enable
                            - "="
                            - false
                        required: true
        - variable: additional_storage
          label: "Additional Storage"
          schema:
            type: list
            default: []
            items:
              - variable: storageEntry
                label: "Storage Entry"
                schema:
                  type: dict
                  attrs:
                    - variable: type
                      label: "Type"
                      description: "ixVolume: Is dataset created automatically by the system.</br>\nHost Path: Is a path that already exists on the system.\n"
                      schema:
                        type: string
                        required: true
                        default: "ix_volume"
                        enum:
                          - value: "host_path"
                            description: "Host Path (Path that already exists on the system)"
                          - value: "ix_volume"
                            description: "ixVolume (Dataset created automatically by the system)"
                    - variable: read_only
                      label: "Read Only"
                      description: "Mount the volume as read only."
                      schema:
                        type: boolean
                        default: false
                    - variable: mount_path
                      label: "Mount Path"
                      description: "The path inside the container to mount the storage."
                      schema:
                        type: path
                        required: true
                    - variable: host_path_config
                      label: "Host Path Configuration"
                      schema:
                        type: dict
                        show_if:
                          - - type
                            - "="
                            - "host_path"
                        attrs:
                          - variable: acl_enable
                            label: "Enable ACL"
                            schema:
                              type: boolean
                              default: false
                          - variable: acl
                            label: "ACL Configuration"
                            schema:
                              type: dict
                              show_if:
                                - - acl_enable
                                  - "="
                                  - true
                              attrs: []
                              $ref:
                                - normalize/acl
                          - variable: path
                            label: "Host Path"
                            schema:
                              type: hostpath
                              show_if:
                                - - acl_enable
                                  - "="
                                  - false
                              required: true
                    - variable: ix_volume_config
                      label: "ixVolume Configuration"
                      schema:
                        type: dict
                        show_if:
                          - - type
                            - "="
                            - "ix_volume"
                        $ref:
                          - normalize/ix_volume
                        attrs:
                          - variable: acl_enable
                            label: "Enable ACL"
                            schema:
                              type: boolean
                              default: false
                          - variable: dataset_name
                            label: "Dataset Name"
                            schema:
                              type: string
                              required: true
                              default: "storage_entry"
                          - variable: acl_entries
                            label: "ACL Configuration"
                            schema:
                              type: dict
                              show_if:
                                - - acl_enable
                                  - "="
                                  - true
                              attrs: []

  - variable: labels
    label: ""
    group: "Labels Configuration"
    schema:
      type: list
      default: []
      items:
        - variable: label
          label: "Label"
          schema:
            type: dict
            attrs:
              - variable: key
                label: "Key"
                schema:
                  type: string
                  required: true
              - variable: value
                label: "Value"
                schema:
                  type: string
                  required: true
              - variable: containers
                label: "Containers"
                description: "Containers where the label should be applied"
                schema:
                  type: list
                  items:
                    - variable: container
                      label: "Container"
                      schema:
                        type: string
                        required: true
                        enum:
                          - value: "inventory-control"
                            description: "inventory-control"
                          - value: "inventory-db"
                            description: "inventory-db"

  - variable: resources
    label: ""
    group: "Resources Configuration"
    schema:
      type: dict
      attrs:
        - variable: limits
          label: "Limits"
          schema:
            type: dict
            attrs:
              - variable: cpus
                label: "CPUs"
                description: "CPUs limit for Inventory Control."
                schema:
                  type: int
                  default: 2
                  required: true
              - variable: memory
                label: "Memory (in MB)"
                description: "Memory limit for Inventory Control."
                schema:
                  type: int
                  default: 4096
                  required: true
