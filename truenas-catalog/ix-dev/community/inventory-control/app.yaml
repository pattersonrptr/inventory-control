app_version: "6.0.1"
capabilities:
  - description: "Inventory Control is able to change file ownership"
    name: "CHOWN"
  - description: "Inventory Control is able to bypass file permission checks"
    name: "DAC_OVERRIDE"
  - description: "Inventory Control is able to bypass permission checks for file operations"
    name: "FOWNER"
  - description: "Inventory Control is able to change group ID of processes"
    name: "SETGID"
  - description: "Inventory Control is able to change user ID of processes"
    name: "SETUID"
  - description: "Inventory Control is able to bind to privileged ports (< 1024)"
    name: "NET_BIND_SERVICE"
categories:
  - productivity
date_added: "2025-06-28"
description: "ASP.NET Core MVC inventory management system with e-commerce integration (Nuvemshop). Manage products, categories, suppliers, stock movements, and synchronize with online stores."
